<!DOCTYPE html>
<html>
<head>
  <title>F1 Reaction Game</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000000);
    color: white;
    text-align: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: 50px;
    color: #ff0000;
    letter-spacing: 2px;
    margin-top: 20px;
    text-shadow: 0 0 20px rgba(255,0,0,0.7);
  }

  /* LIGHTS CONTAINER */
  .lights {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 50px 0;
  }

  /* INDIVIDUAL LIGHT */
  .light {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #330000, #110000);
    border-radius: 50%;
    box-shadow: inset 0 0 10px #000;
    transition: all 0.2s ease-in-out;
  }

  /* ACTIVE LIGHT */
  .light.on {
    background: radial-gradient(circle, #ff1a1a, #800000);
    box-shadow: 
      0 0 20px red,
      0 0 40px red,
      0 0 60px rgba(255,0,0,0.7);
    transform: scale(1.1);
  }

  /* CLICK AREA */
  #clickArea {
    margin: 30px auto;
    width: 260px;
    height: 110px;
    line-height: 110px;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
    border: 2px solid #ff0000;
    cursor: pointer;
    user-select: none;
    background: linear-gradient(135deg, #111, #222);
    box-shadow: 0 0 15px rgba(255,0,0,0.3);
    transition: all 0.2s ease;
  }

  #clickArea:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,0,0,0.7);
  }

  /* READY STATE */
  .ready {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: black;
    box-shadow: 
      0 0 20px #00ff88,
      0 0 40px #00ff88;
    border: none;
  }

  /* LEADERBOARD */
  h2 {
    margin-top: 40px;
    font-size: 28px;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  table {
    margin: 30px auto;
    border-collapse: collapse;
    width: 60%;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
  }

  th {
    background: #ff0000;
    color: white;
    padding: 12px;
    font-size: 18px;
    letter-spacing: 1px;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  tr:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.01);
    transition: 0.2s;
  }

  /* GOLD WINNER ROW */
  tr:first-child {
    background: linear-gradient(90deg, gold, #ffcc00);
    color: black;
    font-weight: bold;
    box-shadow: 0 0 20px gold;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .light {
      width: 40px;
      height: 40px;
    }

    #clickArea {
      width: 200px;
      height: 90px;
      line-height: 90px;
    }

    table {
      width: 90%;
    }
  }
</style>
</head>

<body>

<h1>F1 Reaction Test</h1>

<div class="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div id="clickArea">Wait...</div>

<h2>Leaderboard</h2>
<table>
  <thead>
    <tr><th>Name</th><th>Time</th></tr>
  </thead>
  <tbody id="board"></tbody>
</table>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwZukjnD7sTmIHXkKVtwIcHvwO516PAfdHa2Uzz3yWBYa2Ac30abXzpqUP54DslZMccRg/exec"; // 🔥 PUT YOUR GOOGLE SCRIPT URL HERE

let lights = [1,2,3,4,5].map(i => document.getElementById("l"+i));
let clickArea = document.getElementById("clickArea");
let board = document.getElementById("board");

let startTime = 0;
let gameState = "idle"; // idle, waiting, ready

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function startGame(){
  gameState = "waiting";
  clickArea.innerText = "Wait...";
  clickArea.classList.remove("ready");

  // reset lights
  lights.forEach(l => l.classList.remove("on"));

  // smooth lights ON
  for(let i = 0; i < lights.length; i++){
    lights[i].classList.add("on");
    await sleep(400);
  }

  // random delay (real F1 feel)
  let randomDelay = Math.random() * 2000 + 500;
  await sleep(randomDelay);

  // LIGHTS OUT
  lights.forEach(l => l.classList.remove("on"));

  clickArea.innerText = "CLICK!";
  clickArea.classList.add("ready");

  startTime = performance.now();
  gameState = "ready";
}

clickArea.onclick = async function(){

  // ❌ false start
  if(gameState === "waiting"){
    clickArea.innerText = "❌ False Start!";
    gameState = "idle";
    return;
  }

  if(gameState !== "ready") return;

  gameState = "idle";

  let reactionTime = (performance.now() - startTime)/1000;

  let name = prompt("Enter name:");
  if(name){
    await fetch(URL, {
      method: "POST",
      body: JSON.stringify({name: name, time: reactionTime})
    });
  }

  clickArea.innerText = "Restart";
  clickArea.classList.remove("ready");

  loadData();
};

// restart
clickArea.addEventListener("click", function(){
  if(gameState === "idle" && clickArea.innerText === "Restart"){
    startGame();
  }
});

// load leaderboard
async function loadData(){
  let res = await fetch(URL);
  let data = await res.json();

  let rows = data.slice(1);

  rows.sort((a,b)=> parseFloat(a[1]) - parseFloat(b[1]));

  board.innerHTML = "";

  rows.forEach((row, index)=>{
    let tr = document.createElement("tr");

    if(index === 0){
      tr.style.background = "gold";
      tr.style.color = "black";
    }

    tr.innerHTML = `<td>${row[0]}</td><td>${parseFloat(row[1]).toFixed(3)}</td>`;
    board.appendChild(tr);
  });
}

// auto refresh leaderboard
setInterval(loadData, 3000);

startGame();
loadData();
</script>

</body>
</html>
